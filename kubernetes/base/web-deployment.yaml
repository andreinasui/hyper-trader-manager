apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypertrader-web
  namespace: hyper-trader
  labels:
    app: hypertrader-web
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hypertrader-web
  template:
    metadata:
      labels:
        app: hypertrader-web
        component: frontend
    spec:
      containers:
      - name: web
        image: ghcr.io/andreinasui/hyper-trader-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: VITE_API_URL
          value: "http://hypertrader-api:8000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hypertrader-web
  namespace: hyper-trader
  labels:
    app: hypertrader-web
spec:
  type: ClusterIP
  selector:
    app: hypertrader-web
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hypertrader-web
  namespace: hyper-trader
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.hypertrader.io
    secretName: hypertrader-web-tls
  rules:
  - host: app.hypertrader.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hypertrader-web
            port:
              number: 80
