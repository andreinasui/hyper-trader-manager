# HyperTrader Manager Stack — production
#   Installed by scripts/install.sh to /opt/hyper-trader/docker-compose.yml
#   docker compose -f docker-compose.yml up -d

services:
  # ============================================
  # Init: volume setup
  #   - acme.json must be mode 600 or Traefik refuses to start
  #   - update-state must be owned by uid 1000 (the API user)
  # ============================================
  init:
    image: busybox
    command: sh -c "touch /letsencrypt/acme.json && chmod 600 /letsencrypt/acme.json && chown -R 1000:1000 /var/lib/update-state"
    volumes:
      - traefik-acme:/letsencrypt
      - update-state:/var/lib/update-state

  # ============================================
  # Traefik reverse proxy
  # Routes /api/* → api, /* → web
  # ============================================
  traefik:
    image: traefik:v3.3
    container_name: hypertrader-traefik
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-80}:80"
      - "${HTTPS_PUBLIC_PORT:-443}:443"
    volumes:
      - ./traefik:/etc/traefik:ro
      - traefik-acme:/letsencrypt
    networks:
      - hypertrader
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ============================================
  # API service (FastAPI + uvicorn)
  # ============================================
  api:
    image: ${HYPERTRADER_API_IMAGE}
    container_name: hypertrader-api
    restart: unless-stopped
    env_file:
      - api.env
    group_add:
      - ${DOCKER_GID:-999}
    environment:
      - UPDATE_STATE_DIR=/var/lib/update-state
      - COMPOSE_PROJECT_DIR=${COMPOSE_PROJECT_DIR}
      - GITHUB_REPO=${GITHUB_REPO:-andreinasui/hyper-trader-manager}
      - HELPER_IMAGE=${HELPER_IMAGE}
      - UPDATE_INTERVAL_SECONDS=${UPDATE_INTERVAL_SECONDS:-3600}
    volumes:
      # Persistent data: SQLite database and trader configs
      - hypertrader-data:/app/data
      # Docker socket access for managing trader containers
      - ${DOCKER_SOCK}:/var/run/docker.sock
      # Bind mount for Traefik config (wizard writes here)
      - ./traefik:/host-traefik
      # Update state persistence
      - update-state:/var/lib/update-state
      # Stack directory (read-only) for update system
      - ${COMPOSE_PROJECT_DIR}:${COMPOSE_PROJECT_DIR}:ro
    networks:
      - hypertrader
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Web service
  # ============================================
  web:
    image: ${HYPERTRADER_WEB_IMAGE}
    container_name: hypertrader-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - hypertrader
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy

networks:
  hypertrader:
    driver: bridge

volumes:
  hypertrader-data:
  traefik-acme:
  update-state:
