http:
  routers:
    health:
      rule: "Path(`/health`)"
      service: web
      entryPoints:
        - web
      priority: 20
    web:
      rule: "PathPrefix(`/`)"
      service: web
      entryPoints:
        - web
      priority: 1

  services:
    web:
      loadBalancer:
        servers:
          - url: "http://web:3000"
        healthCheck:
          path: /
          interval: "10s"
          timeout: "5s"
