# Traefik dynamic configuration
# Routes: /api/* → api service, /* → web service

http:
  routers:
    # Health check router: exposes /health directly from the API
    health:
      rule: "Path(`/health`)"
      service: api
      entryPoints:
        - web
      priority: 20

    # API router: matches /api and /api/* paths
    api:
      rule: "PathPrefix(`/api`)"
      service: api
      entryPoints:
        - web
      priority: 10

    # Web router: catch-all for frontend SPA
    web:
      rule: "PathPrefix(`/`)"
      service: web
      entryPoints:
        - web
      priority: 1

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://api:8000"
        healthCheck:
          path: /health
          interval: "10s"
          timeout: "5s"

    web:
      loadBalancer:
        servers:
          - url: "http://web:80"
        healthCheck:
          path: /health
          interval: "10s"
          timeout: "5s"
