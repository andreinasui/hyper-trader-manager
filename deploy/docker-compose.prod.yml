# HyperTrader Manager Stack
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ============================================
  # Traefik reverse proxy
  # Routes /api/* → api, /* → web
  # ============================================
  traefik:
    image: traefik:v3.3
    container_name: hypertrader-traefik
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-80}:80"
      - "${HTTPS_PUBLIC_PORT-:443}:443"
    volumes:
      - ./data/traefik:/etc/traefik:ro
      - ./data/traefik/certs:/certs:ro
      - ./data/traefik/acme.json:/letsencrypt/acme.json
    networks:
      - hypertrader
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ============================================
  # API service (FastAPI + uvicorn)
  # ============================================
  api:
    image: hypertrader-api:${HYPERTRADER_API_IMAGE_VERSION}
    container_name: hypertrader-api
    restart: unless-stopped
    env_file:
      - api.env
    group_add:
      - ${DOCKER_GID:-999}
    volumes:
      # Persistent data: SQLite database and trader configs
      - hypertrader-data:/app/data
      # Docker socket access for managing trader containers
      - ${DOCKER_SOCK}:/var/run/docker.sock
    networks:
      - hypertrader
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Web service
  # ============================================
  web:
    image: hypertrader-web:${HYPERTRADER_WEB_IMAGE_VERSION}
    container_name: hypertrader-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - hypertrader
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy

networks:
  hypertrader:
    driver: bridge

volumes:
  hypertrader-data:
