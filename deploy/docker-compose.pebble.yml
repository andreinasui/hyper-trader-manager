# Pebble overlay for local SSL testing.
#
# Usage:
#   1. (host) ensure deploy/.env.api.pebble is present (copy from .env.api.pebble.example)
#   2. docker compose \
#        -f docker-compose.dev.yml \
#        -f docker-compose.pebble.yml \
#        --env-file .env \
#        up -d --build
#   3. browse to http://hypertrader.localtest.me/
#   4. submit the SSL wizard with domain=hypertrader.localtest.me
#   5. browser ends up on https://hypertrader.localtest.me (cert is from Pebble — your
#      browser will warn; trust it once for testing).
#
# To return to vanilla dev: drop the -f docker-compose.pebble.yml flag.

services:
  pebble:
    image: ghcr.io/letsencrypt/pebble:latest
    container_name: hypertrader-pebble
    restart: unless-stopped
    command:
      - "-config"
      - "/test/config/pebble-config.json"
    environment:
      - PEBBLE_VA_NOSLEEP=1
      - PEBBLE_VA_ALWAYS_VALID=0
    volumes:
      - ./pebble/pebble-config.json:/test/config/pebble-config.json:ro
    networks:
      - hypertrader

  # The traefik container also answers to hypertrader.localtest.me on the
  # internal docker network, so when Pebble performs the HTTP-01 challenge
  # against that hostname its lookup hits traefik (which serves :80) instead
  # of leaving the network and trying to reach 127.0.0.1 on Pebble itself.
  #
  # Traefik also needs Pebble's MiniCA root cert so its embedded ACME client
  # (Lego) trusts the Pebble directory's TLS cert. LEGO_CA_CERTIFICATES is
  # the documented Lego env var for adding extra trusted roots.
  traefik:
    networks:
      hypertrader:
        aliases:
          - hypertrader.localtest.me
    environment:
      - LEGO_CA_CERTIFICATES=/etc/ssl/pebble.minica.pem
    volumes:
      - ./pebble/pebble.minica.pem:/etc/ssl/pebble.minica.pem:ro

  # api gets two new env vars when this overlay is loaded:
  #   ACME_CA_SERVER: tells our app to emit caServer= in the rendered traefik.yml
  #   ENVIRONMENT=production: required for the SSL wizard to run at all
  api:
    env_file:
      - .env.api.pebble
    depends_on:
      pebble:
        condition: service_started
